<html>
    <head>
        <link rel="stylesheet" href="index.css">
        <style>@import url('https://fonts.cdnfonts.com/css/cursed-timer-ulil');</style>
    </head>
    <body>
        <h2>Score Keep</h2>
        <p id="game-over"></p>
        <div class="container">
            <div id="home">
                <h3>HOME</h3>
                <div class="score">
                    <p id="score-home">0</p>
                </div>
                <div class="add-points-btns">
                    <button id="plus-1" onclick="homeAddOne()">+1</button>
                    <button id="plus-2" onclick="homeAddTwo()">+2</button>
                    <button id="plus-3" onclick="homeAddThree()">+3</button>
                </div>  
            </div>
            <div id="guest">
                <h3>GUEST</h3>
                <div class="score">
                    <p id="score-guest">0</p>
                </div>
                <div class="add-points-btns">
                    <button id="plus-1" onclick="guestAddOne()">+1</button>
                    <button id="plus-2" onclick="guestAddTwo()">+2</button>
                    <button id="plus-3" onclick="guestAddThree()">+3</button>
                </div> 
            </div>
        </div>
        <div class="container">
            <div class="game-controls">
                <button id="end-game" onclick="endGame()">End Game</button>
                <button id="new-game" onclick="reset()">New Game</button>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
